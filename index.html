<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO ARENA | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Rajdhani', sans-serif; }
        
        /* Layout fiel às suas fotos */
        .main-card { border: 1px solid #8b5cf6; box-shadow: 0 0 25px rgba(139, 92, 246, 0.2); background-color: #0d0d0d; border-radius: 20px; }
        .input-arena { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: white; padding: 12px; width: 100%; outline: none; }
        .input-arena:focus { border-color: #8b5cf6; }
        
        .btn-iniciar { background: linear-gradient(90deg, #8b5cf6, #d946ef); border-radius: 12px; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .btn-entrar { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; font-weight: 900; text-transform: uppercase; color: white; transition: 0.3s; }
        .btn-entrar:hover { background: #252525; }

        .photo-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; overflow: hidden; }
        .ranking-item { border-bottom: 1px solid #222; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="homeScreen" class="w-full max-w-[400px] p-8 main-card text-center">
        <h1 class="text-4xl font-black italic italic tracking-tighter">PHOTO <span class="text-purple-500 underline">ARENA</span></h1>
        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-8">Competição em tempo real</p>

        <div class="space-y-4">
            <div class="text-left">
                <label class="text-[10px] text-zinc-500 font-bold uppercase ml-1">Criar nova partida</label>
                <input id="roomName" type="text" placeholder="Nome da Arena" class="input-arena mb-2">
                <input id="roomTime" type="number" placeholder="Minutos" class="input-arena mb-3">
                <button onclick="criarArena()" class="w-full p-4 btn-iniciar flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle text-sm"></i> Iniciar Arena
                </button>
            </div>

            <div class="flex items-center gap-2 py-2">
                <div class="h-[1px] bg-zinc-800 flex-1"></div>
                <span class="text-[10px] text-zinc-600 font-bold">OU</span>
                <div class="h-[1px] bg-zinc-800 flex-1"></div>
            </div>

            <div class="text-left">
                <label class="text-[10px] text-zinc-500 font-bold uppercase ml-1">Entrar com código</label>
                <input id="joinCode" type="text" placeholder="0000" class="input-arena mb-3 text-center text-xl font-mono tracking-widest">
                <button onclick="entrarArena()" class="w-full p-4 btn-entrar flex items-center justify-center gap-2">
                    <i class="fas fa-gamepad"></i> Entrar na Batalha
                </button>
            </div>
        </div>
    </div>

    <div id="arenaScreen" class="hidden w-full max-w-5xl">
        <div class="main-card p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-purple-600 p-3 rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                    <i class="fas fa-bolt text-2xl"></i>
                </div>
                <div>
                    <h2 id="dispRoomName" class="text-2xl font-black uppercase italic leading-none">---</h2>
                    <p class="text-zinc-500 font-mono text-sm uppercase">CÓDIGO: <span id="dispCode" class="text-purple-400">0000</span></p>
                </div>
            </div>
            <div class="flex items-center gap-8">
                <div class="text-right">
                    <p class="text-[10px] text-zinc-500 font-black uppercase">Cronômetro</p>
                    <p id="timerDisplay" class="text-4xl font-mono font-black text-white">00:00</p>
                </div>
                <button onclick="location.reload()" class="bg-red-900/20 text-red-500 border border-red-900/30 px-4 py-2 rounded-lg text-[10px] font-black uppercase">Sair</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-zinc-900/30 border-2 border-dashed border-zinc-800 p-10 rounded-3xl text-center">
                    <label class="btn-iniciar px-10 py-4 rounded-xl cursor-pointer inline-block text-sm">
                        <i class="fas fa-camera mr-2"></i> PUBLICAR FOTO (+200 PTS)
                        <input type="file" accept="image/*" onchange="enviarFoto(this)">
                    </label>
                </div>
                <div id="photoFeed" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            </div>

            <div class="main-card h-fit overflow-hidden">
                <div class="bg-zinc-800/50 p-4 font-black uppercase text-[10px] border-b border-zinc-800">Ranking Online</div>
                <div id="rankingList"></div>
            </div>
        </div>
    </div>

    <script>
        let peer;
        let conn;
        let connections = [];
        let myNick = "Player_" + Math.floor(Math.random()*99);
        let gameState = { players: {}, photos: [], timeLeft: 0 };

        // 1. CRIAR ARENA
        function criarArena() {
            const name = document.getElementById('roomName').value;
            const time = document.getElementById('roomTime').value;
            if(!name || !time) return alert("Preencha o nome e o tempo!");

            const code = Math.floor(1000 + Math.random() * 9000).toString();
            
            // Inicia o Peer com o ID do código
            peer = new Peer('ARENA-' + code);
            
            peer.on('open', () => {
                document.getElementById('homeScreen').classList.add('hidden');
                document.getElementById('arenaScreen').classList.remove('hidden');
                document.getElementById('dispCode').innerText = code;
                document.getElementById('dispRoomName').innerText = name;
                
                gameState.timeLeft = time * 60;
                iniciarTimer();
                atualizarRanking(myNick, 0);
            });

            // Escuta quem entrar
            peer.on('connection', (c) => {
                connections.push(c);
                c.on('data', (data) => {
                    if(data.type === 'JOIN') {
                        gameState.players[data.nick] = 0;
                        syncTudo();
                    }
                    if(data.type === 'FOTO') {
                        gameState.photos.unshift(data);
                        gameState.players[data.nick] = (gameState.players[data.nick] || 0) + 200;
                        syncTudo();
                    }
                });
            });
        }

        // 2. ENTRAR NA ARENA
        function entrarArena() {
            const code = document.getElementById('joinCode').value;
            if(!code) return alert("Digite o código!");

            peer = new Peer();
            peer.on('open', (id) => {
                conn = peer.connect('ARENA-' + code);
                
                conn.on('open', () => {
                    conn.send({ type: 'JOIN', nick: myNick });
                    document.getElementById('homeScreen').classList.add('hidden');
                    document.getElementById('arenaScreen').classList.remove('hidden');
                    document.getElementById('dispCode').innerText = code;
                });

                conn.on('data', (data) => {
                    if(data.type === 'SYNC') {
                        gameState = data.state;
                        renderizarArena();
                    }
                });

                // Caso demore e não ache a sala
                setTimeout(() => {
                    if(document.getElementById('arenaScreen').classList.contains('hidden')) {
                        alert("Sala não encontrada! Verifique se o criador ainda está online.");
                        location.reload();
                    }
                }, 5000);
            });
        }

        // 3. ENVIAR FOTO
        function enviarFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fotoData = { type: 'FOTO', src: e.target.result, nick: myNick };
                    
                    if(conn) { // Se for convidado
                        conn.send(fotoData);
                    } else { // Se for o dono
                        gameState.photos.unshift(fotoData);
                        gameState.players[myNick] = (gameState.players[myNick] || 0) + 200;
                        syncTudo();
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // FUNÇÕES DE SUPORTE
        function syncTudo() {
            connections.forEach(c => c.send({ type: 'SYNC', state: gameState }));
            renderizarArena();
        }

        function renderizarArena() {
            // Atualizar Fotos
            const feed = document.getElementById('photoFeed');
            feed.innerHTML = gameState.photos.map(p => `
                <div class="photo-card animate-in zoom-in duration-300">
                    <img src="${p.src}" class="w-full aspect-square object-cover">
                    <div class="p-2 text-center text-[10px] font-bold text-purple-400 uppercase tracking-tighter">${p.nick}</div>
                </div>
            `).join('');

            // Atualizar Ranking
            const ranking = document.getElementById('rankingList');
            const sorted = Object.entries(gameState.players).sort((a,b) => b[1] - a[1]);
            ranking.innerHTML = sorted.map(([nick, pts]) => `
                <div class="ranking-item ${nick === myNick ? 'bg-purple-500/10 border-l-2 border-purple-500' : ''}">
                    <span class="font-bold text-sm uppercase">${nick}</span>
                    <span class="text-purple-400 font-black">${pts}</span>
                </div>
            `).join('');
        }

        function iniciarTimer() {
            setInterval(() => {
                if(gameState.timeLeft > 0) {
                    gameState.timeLeft--;
                    const m = Math.floor(gameState.timeLeft / 60);
                    const s = gameState.timeLeft % 60;
                    document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    if(!conn) syncTudo(); // Só o dono sincroniza o tempo
                }
            }, 1000);
        }

        function atualizarRanking(nick, pts) {
            gameState.players[nick] = pts;
            renderizarArena();
        }
    </script>
</body>
</html>
