<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO ARENA | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Rajdhani', sans-serif; }
        .neon-border { border: 1px solid #8b5cf6; box-shadow: 0 0 25px rgba(139, 92, 246, 0.2); }
        .btn-gamer { background: linear-gradient(90deg, #8b5cf6, #d946ef); transition: all 0.3s ease; }
        .btn-gamer:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 0 20px rgba(217, 70, 239, 0.4); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="home" class="p-8 bg-zinc-900 rounded-2xl neon-border w-[380px] text-center">
        <h1 class="text-4xl font-black mb-1 italic italic tracking-tighter">PHOTO <span class="text-purple-500">ARENA</span></h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mb-8 font-bold">Competição em Tempo Real</p>
        
        <div class="space-y-4">
            <div class="text-left text-xs font-bold text-zinc-400 uppercase ml-1 mb-1">Criar Nova Partida</div>
            <input id="roomName" type="text" placeholder="Nome da Arena" class="w-full p-3 bg-zinc-800 rounded-lg border border-zinc-700 outline-none focus:border-purple-500 mb-2">
            <input id="duration" type="number" placeholder="Minutos (ex: 10)" class="w-full p-3 bg-zinc-800 rounded-lg border border-zinc-700 outline-none focus:border-purple-500">
            
            <button onclick="handleCreateRoom()" class="w-full p-3 btn-gamer rounded-lg font-black uppercase text-sm flex items-center justify-center gap-2">
                <i class="fas fa-plus-circle"></i> Iniciar Arena
            </button>
            
            <div class="flex items-center gap-2 my-4">
                <div class="h-[1px] bg-zinc-800 flex-1"></div>
                <span class="text-[10px] text-zinc-600 font-bold uppercase">ou</span>
                <div class="h-[1px] bg-zinc-800 flex-1"></div>
            </div>

            <div class="text-left text-xs font-bold text-zinc-400 uppercase ml-1 mb-1">Entrar com Código</div>
            <input id="joinCode" type="text" maxlength="5" placeholder="00000" class="w-full p-3 bg-zinc-800 rounded-lg border border-zinc-700 text-center text-xl font-mono outline-none focus:border-pink-500 mb-3">
            <button onclick="handleJoinRoom()" class="w-full p-3 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-lg font-black uppercase text-sm flex items-center justify-center gap-2">
                <i class="fas fa-gamepad"></i> Entrar na Batalha
            </button>
        </div>
    </div>

    <div id="arena" class="hidden w-full max-w-5xl p-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-zinc-900 p-6 rounded-2xl neon-border gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-purple-600 p-3 rounded-lg shadow-lg"><i class="fas fa-trophy text-2xl"></i></div>
                <div>
                    <h2 id="displayRoomName" class="text-2xl font-black uppercase italic">---</h2>
                    <p class="text-zinc-400 font-mono text-sm">CÓDIGO: <span id="displayCode" class="text-purple-400">00000</span></p>
                </div>
            </div>
            <div class="text-center">
                <p class="text-zinc-500 uppercase text-[10px] font-black italic">Tempo Restante</p>
                <p id="timer" class="text-4xl font-mono font-black text-white">00:00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3">
                <div class="bg-zinc-900/50 p-20 rounded-3xl border-2 border-dashed border-zinc-800 flex flex-col items-center justify-center">
                    <button onclick="addPoints()" class="btn-gamer px-10 py-4 rounded-xl font-black uppercase text-sm shadow-xl">
                        <i class="fas fa-camera mr-2"></i> Publicar Foto (+200 PTS)
                    </button>
                </div>
            </div>
            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
                <div class="bg-zinc-800 p-4 font-black uppercase text-xs">Ranking da Batalha</div>
                <ul id="leaderboard" class="divide-y divide-zinc-800"></ul>
            </div>
        </div>
    </div>

    <script>
        let roomData = { name: '', code: '', time: 0, points: 0 };
        let timerInterval;

        function handleCreateRoom() {
            const name = document.getElementById('roomName').value;
            const mins = document.getElementById('duration').value;

            if (!name || !mins) return alert("Preencha todos os campos!");

            roomData.name = name;
            roomData.time = mins * 60;
            roomData.code = Math.floor(10000 + Math.random() * 90000).toString();
            roomData.points = 0;

            startArena();
        }

        function handleJoinRoom() {
            const code = document.getElementById('joinCode').value;
            if (code.length !== 5) return alert("O código deve ter 5 dígitos!");
            
            roomData.name = "Arena Conectada";
            roomData.code = code;
            roomData.time = 600; // Tempo padrão para quem entra
            roomData.points = 0;

            startArena();
        }

        function startArena() {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('arena').classList.remove('hidden');
            document.getElementById('displayRoomName').innerText = roomData.name;
            document.getElementById('displayCode').innerText = roomData.code;
            
            updateLeaderboard();
            
            timerInterval = setInterval(() => {
                if (roomData.time <= 0) {
                    clearInterval(timerInterval);
                    alert("TEMPO ESGOTADO! Pontuação final: " + roomData.points);
                    location.reload();
                    return;
                }
                roomData.time--;
                const m = Math.floor(roomData.time / 60);
                const s = roomData.time % 60;
                document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function addPoints() {
            roomData.points += 200;
            updateLeaderboard();
            // Efeito visual simples de "upload"
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = "ENVIANDO...";
            setTimeout(() => { btn.innerHTML = originalText; }, 500);
        }

        function updateLeaderboard() {
            const list = document.getElementById('leaderboard');
            list.innerHTML = `
                <li class="p-4 flex justify-between items-center bg-purple-500/10">
                    <span class="font-bold text-sm text-purple-400 font-bold">#1 VOCÊ</span>
                    <span class="bg-zinc-800 px-3 py-1 rounded text-white font-mono">${roomData.points}</span>
                </li>
                <li class="p-4 flex justify-between items-center opacity-30">
                    <span class="font-bold text-sm">#2 Player_99</span>
                    <span class="bg-zinc-800 px-3 py-1 rounded text-white font-mono">0</span>
                </li>
            `;
        }
    </script>
</body>
</html>
