<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO ARENA | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Rajdhani', sans-serif; }
        
        /* Manter o layout idêntico à imagem */
        .neon-container { 
            border: 1px solid #8b5cf6; 
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.3); 
            background-color: #121212; 
        }
        .btn-gamer { 
            background: linear-gradient(90deg, #8b5cf6, #d946ef); 
            transition: all 0.3s ease; 
        }
        .btn-gamer:hover { filter: brightness(1.1); transform: scale(1.02); }
        
        input { background-color: #1c1c1c !important; border: 1px solid #333 !important; color: white !important; }
        input:focus { border-color: #8b5cf6 !important; outline: none; }
        
        /* Feed Estilo Instagram */
        .photo-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; overflow: hidden; }
        .photo-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="home" class="p-8 rounded-2xl neon-container w-[380px] text-center">
        <h1 class="text-4xl font-black mb-1 italic italic tracking-tighter">PHOTO <span class="text-purple-500 underline">ARENA</span></h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mb-8 font-bold text-center">Competição em Tempo Real</p>
        
        <div class="space-y-4">
            <div class="text-left text-[10px] font-bold text-zinc-400 uppercase ml-1">Criar Nova Partida</div>
            <input id="roomName" type="text" placeholder="Nome da Arena" class="w-full p-3 rounded-lg text-sm">
            <input id="duration" type="number" placeholder="2" class="w-full p-3 rounded-lg text-sm">
            
            <button onclick="createArena()" class="w-full p-3 btn-gamer rounded-lg font-black uppercase text-sm flex items-center justify-center gap-2 shadow-lg">
                <i class="fas fa-plus-circle text-xs"></i> Iniciar Arena
            </button>
            
            <div class="flex items-center gap-2 my-4">
                <div class="h-[1px] bg-zinc-800 flex-1"></div>
                <span class="text-[10px] text-zinc-600 font-bold uppercase">ou</span>
                <div class="h-[1px] bg-zinc-800 flex-1"></div>
            </div>

            <div class="text-left text-[10px] font-bold text-zinc-400 uppercase ml-1">Entrar com Código</div>
            <input id="joinCode" type="text" maxlength="5" placeholder="00000" class="w-full p-3 rounded-lg text-center text-xl font-mono tracking-widest">
            <button onclick="joinArena()" class="w-full p-3 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-lg font-black uppercase text-sm flex items-center justify-center gap-2">
                <i class="fab fa-playstation text-xs"></i> Entrar na Batalha
            </button>
        </div>
    </div>

    <div id="arena" class="hidden w-full max-w-5xl animate-in fade-in duration-500">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-zinc-900 p-6 rounded-2xl neon-container gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-purple-600 p-3 rounded-lg"><i class="fas fa-trophy text-2xl"></i></div>
                <div>
                    <h2 id="activeRoomName" class="text-2xl font-black uppercase italic leading-none">---</h2>
                    <p class="text-zinc-400 font-mono text-sm mt-1">CÓDIGO: <span id="activeCode" class="text-purple-400 font-bold">00000</span></p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-zinc-500 uppercase text-[10px] font-black tracking-widest">Tempo Restante</p>
                <p id="timerDisplay" class="text-4xl font-mono font-black text-white leading-none">00:00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-zinc-900/50 p-10 rounded-3xl border-2 border-dashed border-zinc-800 text-center">
                    <label for="photoInput" class="btn-gamer px-10 py-4 rounded-xl inline-block cursor-pointer font-black text-sm uppercase shadow-xl">
                        <i class="fas fa-camera mr-2"></i> Publicar Foto (+200 PTS)
                    </label>
                    <input type="file" id="photoInput" accept="image/*" onchange="validateAndUpload(event)">
                    <p class="mt-4 text-zinc-600 text-[10px] font-bold uppercase tracking-widest">A pontuação só é validada após o envio do arquivo</p>
                </div>
                
                <h3 class="font-black uppercase text-xs tracking-widest text-zinc-500 italic">Feed da Missão</h3>
                <div id="photoFeed" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    </div>
            </div>

            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden self-start sticky top-4">
                <div class="bg-zinc-800 p-4 font-black uppercase text-[10px] tracking-widest border-b border-zinc-700">Placar Atual</div>
                <ul id="rankingList" class="divide-y divide-zinc-800"></ul>
            </div>
        </div>
    </div>

    <script>
        // Carrega dados salvos para não perder no F5
        let gameState = JSON.parse(localStorage.getItem('arenaSave')) || { name: '', code: '', timeLeft: 0, score: 0, photos: [] };
        let timerLoop;

        // Se já houver um jogo ativo ao abrir a página
        if (gameState.code) { restoreGame(); }

        function createArena() {
            const name = document.getElementById('roomName').value;
            const time = document.getElementById('duration').value;
            if(!name || !time) return alert("Preencha o nome e o tempo!");

            gameState = {
                name: name,
                code: Math.floor(10000 + Math.random() * 90000).toString(),
                timeLeft: time * 60,
                score: 0,
                photos: []
            };
            initGame();
        }

        function joinArena() {
            const code = document.getElementById('joinCode').value;
            if(code.length < 5) return alert("Código inválido!");
            gameState = { name: "Arena Privada", code: code, timeLeft: 1200, score: 0, photos: [] };
            initGame();
        }

        function initGame() {
            localStorage.setItem('arenaSave', JSON.stringify(gameState));
            restoreGame();
        }

        function restoreGame() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('arena').classList.remove('hidden');
            document.getElementById('activeRoomName').innerText = gameState.name;
            document.getElementById('activeCode').innerText = gameState.code;
            
            renderFeed();
            updateRanking();
            
            if(timerLoop) clearInterval(timerLoop);
            timerLoop = setInterval(() => {
                if(gameState.timeLeft <= 0) {
                    clearInterval(timerLoop);
                    alert("TEMPO ESGOTADO!");
                    localStorage.removeItem('arenaSave');
                    location.reload();
                    return;
                }
                gameState.timeLeft--;
                const m = Math.floor(gameState.timeLeft / 60);
                const s = gameState.timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                
                // Salva o tempo a cada segundo
                localStorage.setItem('arenaSave', JSON.stringify(gameState));
            }, 1000);
        }

        function validateAndUpload(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // Adiciona a foto no feed (Base64)
                gameState.photos.unshift(e.target.result);
                // SÓ GANHA PONTO AQUI PORQUE ENVIOU FOTO
                gameState.score += 200;
                
                localStorage.setItem('arenaSave', JSON.stringify(gameState));
                renderFeed();
                updateRanking();
            };
            reader.readAsDataURL(file);
        }

        function renderFeed() {
            const feed = document.getElementById('photoFeed');
            feed.innerHTML = gameState.photos.map(src => `
                <div class="photo-card animate-in zoom-in duration-300">
                    <img src="${src}">
                    <div class="p-2 text-center bg-zinc-800 text-[10px] font-bold text-purple-400">+200 PTS</div>
                </div>
            `).join('');
        }

        function updateRanking() {
            const list = document.getElementById('rankingList');
            list.innerHTML = `
                <li class="p-4 flex justify-between items-center bg-purple-500/10">
                    <span class="font-bold text-sm">VOCÊ (PLAYER)</span>
                    <span class="bg-zinc-800 px-3 py-1 rounded text-purple-400 font-mono font-bold">${gameState.score}</span>
                </li>
            `;
        }
    </script>
</body>
</html>
