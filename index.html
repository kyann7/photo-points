<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO ARENA | Elite Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .neon-container { border: 1px solid #8b5cf6; box-shadow: 0 0 25px rgba(139, 92, 246, 0.3); background-color: #121212; }
        .btn-gamer { background: linear-gradient(90deg, #8b5cf6, #d946ef); transition: all 0.3s ease; cursor: pointer; border: none; }
        .btn-gamer:hover { filter: brightness(1.1); transform: scale(1.02); }
        .nick-input { background: #1a1a1a !important; border: 1px solid #333 !important; color: #a855f7 !important; padding: 8px 15px; border-radius: 8px; font-weight: bold; width: 100%; }
        .avatar-frame { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #333; overflow: hidden; background: #222; position: relative; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .crown-icon { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 30px; z-index: 20; }
        .photo-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="profileBar" class="mb-6 bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex items-center gap-4 w-full max-w-[380px]">
        <label for="avatarInput" class="cursor-pointer">
            <div class="w-14 h-14 rounded-full border-2 border-purple-500 overflow-hidden bg-zinc-800">
                <img id="myAvatarDisplay" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Gamer">
            </div>
            <input type="file" id="avatarInput" accept="image/*" onchange="updateProfileAvatar(event)">
        </label>
        <div class="flex-1">
            <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Seu Nickname</label>
            <input id="myNickname" type="text" onchange="saveProfile()" class="nick-input" value="Player_One">
        </div>
    </div>

    <div id="home" class="p-8 rounded-2xl neon-container w-[380px] text-center">
        <h1 class="text-4xl font-black mb-1 italic tracking-tighter">PHOTO <span class="text-purple-500 underline">ARENA</span></h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mb-8 font-bold">Battle Station</p>
        
        <div class="space-y-4">
            <input id="roomName" type="text" placeholder="Nome da Arena" class="w-full p-3 rounded-lg bg-zinc-800 border border-zinc-700 outline-none">
            <input id="duration" type="number" placeholder="Minutos" class="w-full p-3 rounded-lg bg-zinc-800 border border-zinc-700 outline-none">
            <button onclick="createArena()" class="w-full p-3 btn-gamer rounded-lg font-black uppercase text-sm">Iniciar Arena</button>
            <div class="py-2 text-[10px] text-zinc-600 font-bold uppercase tracking-widest">ou</div>
            <input id="joinCode" type="text" maxlength="4" placeholder="CÓDIGO" class="w-full p-3 rounded-lg bg-zinc-800 border border-zinc-700 text-center text-xl font-mono">
            <button onclick="joinArena()" class="w-full p-3 bg-zinc-800 border border-zinc-700 rounded-lg font-black uppercase text-sm hover:bg-zinc-700">Entrar na Batalha</button>
        </div>
    </div>

    <div id="arena" class="hidden w-full max-w-5xl">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-zinc-900 p-6 rounded-2xl neon-container gap-4">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="text-zinc-500 hover:text-white mr-2"><i class="fas fa-chevron-left text-xl"></i></button>
                <div class="bg-purple-600 p-3 rounded-lg"><i class="fas fa-bolt text-2xl"></i></div>
                <div>
                    <h2 id="activeRoomName" class="text-2xl font-black uppercase italic">---</h2>
                    <p class="text-zinc-400 font-mono text-sm">CÓDIGO: <span id="activeCode" class="text-purple-400">0000</span></p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right border-r border-zinc-800 pr-6">
                    <p class="text-zinc-500 uppercase text-[10px] font-black">Cronômetro</p>
                    <p id="timerDisplay" class="text-4xl font-mono font-black text-white">00:00</p>
                </div>
                <button onclick="location.reload()" class="bg-red-900/20 text-red-500 hover:bg-red-900/40 px-4 py-2 rounded-lg text-xs font-bold uppercase border border-red-900/50">Sair</button>
            </div>
        </div>

        <div id="activeContent" class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-zinc-900/50 p-10 rounded-3xl border-2 border-dashed border-zinc-800 text-center">
                    <label for="photoInput" class="btn-gamer px-10 py-4 rounded-xl inline-block cursor-pointer font-black text-sm uppercase">
                        <i class="fas fa-camera mr-2"></i> Publicar Foto (+200 PTS)
                    </label>
                    <input type="file" id="photoInput" accept="image/*" onchange="uploadPhoto(event)">
                </div>
                <div id="photoFeed" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            </div>
            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 h-fit">
                <div class="bg-zinc-800 p-4 font-black uppercase text-[10px] border-b border-zinc-700">Ranking Online</div>
                <ul id="rankingList" class="divide-y divide-zinc-800"></ul>
            </div>
        </div>
    </div>

    <script>
        // Inicializa o GunJS (Banco de dados descentralizado)
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        
        let profile = { nick: 'User_'+Math.floor(Math.random()*99), avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=1' };
        let currentRoom = null;
        let isOwner = false;

        // Carregar Nick Salvo
        const savedNick = localStorage.getItem('arena_nick');
        if(savedNick) {
            profile.nick = savedNick;
            document.getElementById('myNickname').value = savedNick;
        }

        function saveProfile() {
            profile.nick = document.getElementById('myNickname').value;
            localStorage.setItem('arena_nick', profile.nick);
        }

        function updateProfileAvatar(e) {
            const r = new FileReader();
            r.onload = (ev) => { profile.avatar = ev.target.result; document.getElementById('myAvatarDisplay').src = ev.target.result; };
            r.readAsDataURL(e.target.files[0]);
        }

        function createArena() {
            const name = document.getElementById('roomName').value;
            const time = document.getElementById('duration').value;
            if(!name || !time) return alert("Preencha Nome e Tempo!");

            const code = Math.floor(1000 + Math.random() * 9000).toString();
            isOwner = true;

            // Criar sala no GunJS
            gun.get('arena_rooms').get(code).put({
                name: name,
                timeLeft: parseInt(time) * 60,
                status: 'running',
                owner: profile.nick
            });

            enterRoom(code);
            
            // Iniciar cronômetro (quem cria controla o tempo)
            setInterval(() => {
                gun.get('arena_rooms').get(code).get('timeLeft').once(t => {
                    if(t > 0) gun.get('arena_rooms').get(code).get('timeLeft').put(t - 1);
                });
            }, 1000);
        }

        function joinArena() {
            const code = document.getElementById('joinCode').value;
            gun.get('arena_rooms').get(code).once(data => {
                if(data) enterRoom(code);
                else alert("Sala não encontrada!");
            });
        }

        function enterRoom(code) {
            currentRoom = code;
            document.getElementById('home').style.display = 'none';
            document.getElementById('profileBar').style.display = 'none';
            document.getElementById('arena').classList.remove('hidden');
            document.getElementById('activeCode').innerText = code;

            // Adicionar-se aos participantes
            gun.get('arena_rooms').get(code).get('players').get(profile.nick).put({
                score: 0,
                avatar: profile.avatar
            });

            // Sincronização em Tempo Real
            gun.get('arena_rooms').get(code).on(data => {
                document.getElementById('activeRoomName').innerText = data.name;
                const m = Math.floor(data.timeLeft / 60);
                const s = data.timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            });

            // Sincronizar Ranking
            gun.get('arena_rooms').get(code).get('players').map().on((p, nick) => {
                updateRankingUI(nick, p);
            });

            // Sincronizar Fotos
            gun.get('arena_rooms').get(code).get('photos').map().on(data => {
                updatePhotoUI(data);
            });
        }

        const playersLocal = {};
        function updateRankingUI(nick, data) {
            playersLocal[nick] = data;
            const sorted = Object.entries(playersLocal).sort((a,b) => b[1].score - a[1].score);
            document.getElementById('rankingList').innerHTML = sorted.map(([n, d]) => `
                <li class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <img src="${d.avatar}" class="w-6 h-6 rounded-full border border-purple-500">
                        <span class="font-bold text-sm uppercase">${n}</span>
                    </div>
                    <span class="text-purple-400 font-bold">${d.score}</span>
                </li>
            `).join('');
        }

        const photosLocal = new Set();
        function updatePhotoUI(data) {
            if(photosLocal.has(data.src)) return;
            photosLocal.add(data.src);
            const div = document.createElement('div');
            div.className = "photo-card animate-pulse";
            div.innerHTML = `
                <img src="${data.src}" class="w-full aspect-square object-cover">
                <div class="p-2 text-center bg-zinc-800 text-[10px] font-bold text-purple-400 uppercase">${data.user}</div>
            `;
            document.getElementById('photoFeed').prepend(div);
            setTimeout(() => div.classList.remove('animate-pulse'), 1000);
        }

        function uploadPhoto(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const src = e.target.result;
                // Salvar foto
                gun.get('arena_rooms').get(currentRoom).get('photos').set({ src: src, user: profile.nick });
                // Dar pontos
                gun.get('arena_rooms').get(currentRoom).get('players').get(profile.nick).get('score').once(s => {
                    gun.get('arena_rooms').get(currentRoom).get('players').get(profile.nick).get('score').put((s || 0) + 200);
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
