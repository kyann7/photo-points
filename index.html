<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTO ARENA | By @WAGH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        .neon-container { border: 1px solid #8b5cf6; box-shadow: 0 0 25px rgba(139, 92, 246, 0.3); background-color: #121212; }
        .btn-gamer { background: linear-gradient(90deg, #8b5cf6, #d946ef); transition: all 0.3s ease; cursor: pointer; border: none; }
        .btn-gamer:hover { filter: brightness(1.1); transform: scale(1.02); }
        
        .nick-input { background: #1a1a1a !important; border: 1px solid #333 !important; color: #a855f7 !important; padding: 8px 15px; border-radius: 8px; font-weight: bold; width: 100%; }
        
        .podium-card { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-top: 40px; }
        .avatar-frame { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #333; overflow: hidden; background: #222; position: relative; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .crown-icon { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 30px; z-index: 20; }
        
        .gold-rank { color: #ffd700; filter: drop-shadow(0 0 8px #ffd700); }
        .silver-rank { color: #c0c0c0; filter: drop-shadow(0 0 5px #c0c0c0); }
        .bronze-rank { color: #cd7f32; filter: drop-shadow(0 0 5px #cd7f32); }

        .photo-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .photo-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="profileBar" class="mb-6 bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex items-center gap-4 w-full max-w-[380px]">
        <label for="avatarInput" class="cursor-pointer flex-shrink-0">
            <div class="w-14 h-14 rounded-full border-2 border-purple-500 overflow-hidden bg-zinc-800 relative group">
                <img id="myAvatarDisplay" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Player" alt="Avatar">
                <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="fas fa-pen text-xs"></i>
                </div>
            </div>
            <input type="file" id="avatarInput" accept="image/*" onchange="updateProfileAvatar(event)">
        </label>
        <div class="flex-1">
            <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Seu Nickname</label>
            <input id="myNickname" type="text" onchange="saveProfile()" class="nick-input" value="Player_One">
        </div>
    </div>

    <div id="home" class="p-8 rounded-2xl neon-container w-[380px] text-center">
        <h1 class="text-4xl font-black mb-1 italic tracking-tighter italic">PHOTO <span class="text-purple-500 underline">ARENA</span></h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mb-8 font-bold">Battle Mode</p>
        
        <div class="space-y-4">
            <div class="text-left text-[10px] font-bold text-zinc-400 uppercase">Criar Arena</div>
            <input id="roomName" type="text" placeholder="Nome da Arena" class="w-full p-3 rounded-lg bg-zinc-800 border border-zinc-700 outline-none">
            <input id="duration" type="number" placeholder="Minutos" class="w-full p-3 rounded-lg bg-zinc-800 border border-zinc-700 outline-none">
            <button onclick="createArena()" class="w-full p-3 btn-gamer rounded-lg font-black uppercase text-sm">Iniciar Arena</button>
            
            <div class="py-2 text-[10px] text-zinc-600 font-bold uppercase tracking-widest">ou</div>

            <input id="joinCode" type="text" maxlength="4" placeholder="CÓDIGO 4 DÍGITOS" class="w-full p-3 rounded-lg bg-zinc-800 border border-zinc-700 text-center text-xl font-mono tracking-[0.3em] outline-none">
            <button onclick="joinArena()" class="w-full p-3 bg-zinc-800 border border-zinc-700 rounded-lg font-black uppercase text-sm hover:bg-zinc-700">Entrar na Batalha</button>
        </div>
    </div>

    <div id="arena" class="hidden w-full max-w-5xl">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-zinc-900 p-6 rounded-2xl neon-container gap-4">
            <div class="flex items-center gap-4">
                <button onclick="backToMenu()" class="text-zinc-500 hover:text-white mr-2"><i class="fas fa-chevron-left text-xl"></i></button>
                <div class="bg-purple-600 p-3 rounded-lg"><i class="fas fa-bolt text-2xl"></i></div>
                <div>
                    <h2 id="activeRoomName" class="text-2xl font-black uppercase italic leading-none">---</h2>
                    <p class="text-zinc-400 font-mono text-sm">CÓDIGO: <span id="activeCode" class="text-purple-400">0000</span></p>
                </div>
            </div>
            
            <div id="activeControls" class="flex items-center gap-6">
                <div class="text-right border-r border-zinc-800 pr-6">
                    <p class="text-zinc-500 uppercase text-[10px] font-black">Cronômetro</p>
                    <p id="timerDisplay" class="text-4xl font-mono font-black text-white">00:00</p>
                </div>
                <button onclick="leaveArena()" class="bg-red-900/20 text-red-500 hover:bg-red-900/40 px-4 py-2 rounded-lg text-xs font-bold uppercase border border-red-900/50">Abandonar</button>
            </div>
        </div>

        <div id="activeContent" class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-zinc-900/50 p-10 rounded-3xl border-2 border-dashed border-zinc-800 text-center">
                    <label for="photoInput" class="btn-gamer px-10 py-4 rounded-xl inline-block cursor-pointer font-black text-sm uppercase">
                        <i class="fas fa-camera mr-2"></i> Publicar Foto (+200 PTS)
                    </label>
                    <input type="file" id="photoInput" accept="image/*" onchange="validateAndUpload(event)">
                </div>
                <div id="photoFeed" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            </div>
            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 h-fit">
                <div class="bg-zinc-800 p-4 font-black uppercase text-[10px] border-b border-zinc-700">Ranking Online</div>
                <ul id="rankingList" class="divide-y divide-zinc-800"></ul>
            </div>
        </div>

        <div id="podiumScreen" class="hidden flex-col items-center bg-zinc-900 p-12 rounded-3xl neon-container">
            <h2 class="text-3xl font-black uppercase italic mb-16 text-purple-500 tracking-widest text-center">Arena Finalizada</h2>
            
            <div class="flex items-end justify-center gap-4 md:gap-16 mb-16 w-full max-w-3xl">
                <div class="podium-card">
                    <i class="fas fa-crown crown-icon bronze-rank"></i>
                    <div class="avatar-frame border-[#cd7f32]"><img id="p3_img" src=""></div>
                    <p id="p3_name" class="font-bold mt-3 text-zinc-400">---</p>
                    <p id="p3_score" class="text-xl font-black">0</p>
                </div>

                <div class="podium-card scale-110">
                    <i class="fas fa-crown crown-icon gold-rank text-4xl"></i>
                    <div class="avatar-frame border-[#ffd700] w-32 h-32"><img id="p1_img" src=""></div>
                    <p id="p1_name" class="font-black mt-3 text-yellow-500 text-xl uppercase">---</p>
                    <p id="p1_score" class="text-4xl font-black text-white">0</p>
                </div>

                <div class="podium-card">
                    <i class="fas fa-crown crown-icon silver-rank"></i>
                    <div class="avatar-frame border-[#c0c0c0] w-24 h-24"><img id="p2_img" src=""></div>
                    <p id="p2_name" class="font-bold mt-3 text-zinc-300">---</p>
                    <p id="p2_score" class="text-xl font-black">0</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 justify-center">
                <button onclick="leaveArena()" class="px-8 py-3 bg-zinc-800 rounded-xl font-bold uppercase text-xs">Sair da Arena</button>
                <div id="adminControls" class="hidden flex gap-4">
                    <button onclick="showExtendModal()" class="px-8 py-3 btn-gamer rounded-xl font-bold uppercase text-xs text-white">Prolongar Tempo</button>
                    <button onclick="deleteArena()" class="px-8 py-3 bg-red-600 rounded-xl font-bold uppercase text-xs text-white">Apagar Sala</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SISTEMA DE SINCRONIZAÇÃO GLOBAL (Simula Banco de Dados no GitHub)
        const getGlobalRooms = () => JSON.parse(localStorage.getItem('GLOBAL_ARENAS')) || {};
        const saveGlobalRoom = (room) => {
            const rooms = getGlobalRooms();
            rooms[room.code] = room;
            localStorage.setItem('GLOBAL_ARENAS', JSON.stringify(rooms));
        };

        let profile = JSON.parse(localStorage.getItem('userProfile')) || { nick: 'Player_1', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Player' };
        let currentSession = JSON.parse(localStorage.getItem('currentArenaSession')) || null;
        let timerLoop;

        document.getElementById('myNickname').value = profile.nick;
        document.getElementById('myAvatarDisplay').src = profile.avatar;
        if (currentSession) restoreGame();

        function saveProfile() {
            profile.nick = document.getElementById('myNickname').value;
            localStorage.setItem('userProfile', JSON.stringify(profile));
            if(currentSession) updateParticipant();
        }

        function updateProfileAvatar(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                profile.avatar = e.target.result;
                document.getElementById('myAvatarDisplay').src = e.target.result;
                saveProfile();
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function createArena() {
            const name = document.getElementById('roomName').value;
            const time = document.getElementById('duration').value;
            if(!name || !time) return alert("Preencha nome e tempo!");

            const newCode = Math.floor(1000 + Math.random() * 9000).toString();
            const newRoom = {
                code: newCode,
                name: name,
                duration: time * 60,
                timeLeft: time * 60,
                status: 'running',
                adminId: profile.nick,
                participants: {},
                photos: []
            };
            
            saveGlobalRoom(newRoom);
            enterRoom(newCode);
        }

        function joinArena() {
            const code = document.getElementById('joinCode').value;
            const rooms = getGlobalRooms();
            if(!rooms[code]) return alert("Sala não encontrada!");
            enterRoom(code);
        }

        function enterRoom(code) {
            const rooms = getGlobalRooms();
            const room = rooms[code];
            
            // Adiciona ou atualiza o jogador na sala global
            if(!room.participants[profile.nick]) {
                room.participants[profile.nick] = { score: 0, avatar: profile.avatar };
            }
            
            saveGlobalRoom(room);
            currentSession = { code: code, isAdmin: room.adminId === profile.nick };
            localStorage.setItem('currentArenaSession', JSON.stringify(currentSession));
            restoreGame();
        }

        function restoreGame() {
            const rooms = getGlobalRooms();
            const room = rooms[currentSession.code];
            if(!room) return leaveArena();

            document.getElementById('home').style.display = 'none';
            document.getElementById('profileBar').style.display = 'none';
            document.getElementById('arena').classList.remove('hidden');
            document.getElementById('activeRoomName').innerText = room.name;
            document.getElementById('activeCode').innerText = room.code;

            if (room.status === 'finished') {
                showPodium(room);
            } else {
                document.getElementById('activeContent').classList.remove('hidden');
                document.getElementById('activeControls').classList.remove('hidden');
                document.getElementById('podiumScreen').classList.add('hidden');
                startSync(room.code);
            }
        }

        function startSync(code) {
            if(timerLoop) clearInterval(timerLoop);
            timerLoop = setInterval(() => {
                const rooms = getGlobalRooms();
                const room = rooms[code];
                
                if(room.status === 'running' && room.adminId === profile.nick) {
                    room.timeLeft--;
                    if(room.timeLeft <= 0) room.status = 'finished';
                    saveGlobalRoom(room);
                }

                if(room.status === 'finished') {
                    clearInterval(timerLoop);
                    showPodium(room);
                } else {
                    renderTimer(room.timeLeft);
                    renderFeed(room.photos);
                    updateRanking(room.participants);
                }
            }, 1000);
        }

        function renderTimer(time) {
            const m = Math.floor(time / 60);
            const s = time % 60;
            document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function validateAndUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const rooms = getGlobalRooms();
                const room = rooms[currentSession.code];
                
                room.photos.unshift({ src: e.target.result, user: profile.nick });
                room.participants[profile.nick].score += 200;
                
                saveGlobalRoom(room);
            };
            reader.readAsDataURL(file);
        }

        function showPodium(room) {
            document.getElementById('activeContent').classList.add('hidden');
            document.getElementById('activeControls').classList.add('hidden');
            document.getElementById('podiumScreen').classList.remove('hidden');
            document.getElementById('podiumScreen').classList.add('flex');

            if(currentSession.isAdmin) document.getElementById('adminControls').classList.remove('hidden');

            const sorted = Object.entries(room.participants)
                .map(([nick, data]) => ({ nick, ...data }))
                .sort((a,b) => b.score - a.score);

            const fill = (id, player) => {
                document.getElementById(`${id}_name`).innerText = player ? player.nick : '---';
                document.getElementById(`${id}_score`).innerText = player ? player.score : '0';
                document.getElementById(`${id}_img`).src = player ? player.avatar : 'https://via.placeholder.com/150';
            };

            fill('p1', sorted[0]);
            fill('p2', sorted[1]);
            fill('p3', sorted[2]);
        }

        function backToMenu() {
            clearInterval(timerLoop);
            document.getElementById('arena').classList.add('hidden');
            document.getElementById('home').style.display = 'block';
            document.getElementById('profileBar').style.display = 'flex';
        }

        function leaveArena() {
            localStorage.removeItem('currentArenaSession');
            location.reload();
        }

        function showExtendModal() {
            const newTime = prompt("Quanto tempo deseja prolongar? (Minutos)");
            if(newTime && !isNaN(newTime)) {
                const rooms = getGlobalRooms();
                const room = rooms[currentSession.code];
                room.status = 'running';
                room.timeLeft = newTime * 60;
                saveGlobalRoom(room);
                location.reload();
            }
        }

        function deleteArena() {
            if(confirm("Apagar sala para todos?")) {
                const rooms = getGlobalRooms();
                delete rooms[currentSession.code];
                localStorage.setItem('GLOBAL_ARENAS', JSON.stringify(rooms));
                leaveArena();
            }
        }

        function renderFeed(photos) {
            document.getElementById('photoFeed').innerHTML = photos.map(p => `
                <div class="photo-card animate-in zoom-in">
                    <img src="${p.src}">
                    <div class="p-2 text-center bg-zinc-800 text-[10px] font-bold text-purple-400">FEITO POR ${p.user}</div>
                </div>
            `).join('');
        }

        function updateRanking(participants) {
            const sorted = Object.entries(participants)
                .map(([nick, data]) => ({ nick, ...data }))
                .sort((a,b) => b.score - a.score);

            document.getElementById('rankingList').innerHTML = sorted.map(p => `
                <li class="p-4 flex justify-between items-center ${p.nick === profile.nick ? 'bg-purple-500/10 border-l-4 border-purple-500' : ''}">
                    <div class="flex items-center gap-2">
                        <img src="${p.avatar}" class="w-6 h-6 rounded-full">
                        <span class="font-bold text-sm uppercase">${p.nick}</span>
                    </div>
                    <span class="text-purple-400 font-bold">${p.score}</span>
                </li>
            `).join('');
        }
    </script>
</body>
</html>
